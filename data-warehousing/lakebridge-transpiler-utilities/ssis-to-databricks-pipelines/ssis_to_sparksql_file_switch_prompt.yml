      # Databricks notebook source
      from pyspark.sql.functions import *
      import uuid, socket, getpass
      from datetime import datetime
      PackageName = 'SSIS_DWH_DimGeography'

      # COMMAND ----------

      Package_Clear_Dim_Geography = f"""TRUNCATE TABLE DimGeography;"""
      spark.sql(Package_Clear_Dim_Geography)

      # COMMAND ----------

      Package_Drop_Indexes = f"""EXECUTE pDropIndexes 'DimGeography';
      EXECUTE pDropAlternateKeys 'DimGeography';
      EXECUTE pDropPrimaryKeys 'DimGeography';"""
      spark.sql(Package_Drop_Indexes)

      # COMMAND ----------

      Package_Load_Zero_Record = f"""EXECUTE pLoadZeroRecord 'DimGeography';"""
      spark.sql(Package_Load_Zero_Record)

      # COMMAND ----------

      Package_Load_Dim_Geography = f"""EXECUTE pLoadDimGeography"""
      spark.sql(Package_Load_Dim_Geography)

      # COMMAND ----------

      Package_Update_Stats = f"""UPDATE STATISTICS DimGeography WITH FULLSCAN"""
      spark.sql(Package_Update_Stats)

      # COMMAND ----------

      Package_Add_Indexes = f"""EXECUTE pCreateDimGeographyIndexes 'DimGeography';"""
      spark.sql(Package_Add_Indexes)
