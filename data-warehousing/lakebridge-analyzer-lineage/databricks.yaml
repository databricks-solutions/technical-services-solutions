bundle:
  name: migration-accelerator

sync:
  include:
    - "*.yaml"
    - "*.yml"
    - "*.py"
    - "*.txt"
    - "*.json"
    - "src/**"
    - "frontend/**"
  exclude:
    - "node_modules/**"
    - "frontend/node_modules/**"
    - "frontend/.next/cache/**"
    - "frontend/.next/trace/**"
    - "**/__pycache__/**"
    - "**/*.pyc"
    - ".databricks/**"
    - "dist/**"
    - ".git/**"
    - ".venv/**"
    - "*.egg-info/**"

resources:
  apps:
    migration-accelerator:
      name: migration-accelerator
      description: "Assess and visualize ETL migration complexity and data lineage"
      source_code_path: ${workspace.root_path}/files
      user_api_scopes:
        - sql
        - files.files
      resources:
        - name: uc_volume
          uc_securable:
            securable_type: VOLUME
            securable_full_name: ${var.uc_volume_securable_name}
            permission: READ_VOLUME
        - name: uc_volume_write
          uc_securable:
            securable_type: VOLUME
            securable_full_name: ${var.uc_volume_securable_name}
            permission: WRITE_VOLUME
      config:
        env:
          - name: PYTHONPATH
            value: src
          - name: STORAGE_BACKEND
            value: unity_catalog
          - name: UC_VOLUME_PATH
            value: ${var.uc_volume_path}
          - name: DEBUG
            value: false

variables:
  uc_volume_path:
    description: "Unity Catalog volume path (e.g., /Volumes/catalog/schema/volume)"

  uc_volume_securable_name:
    description: "Unity Catalog volume securable name (e.g., catalog.schema.volume)"

  debug:
    description: "Enable debug mode"

targets:
  dev:
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      uc_volume_path: /Volumes/my_catalog/migration_accelerator/app_storage
      uc_volume_securable_name: my_catalog.migration_accelerator.app_storage
      debug: false

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      uc_volume_path: /Volumes/my_catalog/migration_accelerator/app_storage
      uc_volume_securable_name: my_catalog.migration_accelerator.app_storage
      debug: false