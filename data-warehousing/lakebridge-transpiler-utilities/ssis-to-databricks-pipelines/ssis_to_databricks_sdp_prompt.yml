    content: |
      # Lakeflow Declarative Pipeline for SSIS_DWH_DimProduct
      # Converted from BladeBridge SSIS output
      # Removed: metadata variables (StartTime, MachineName, UserName, ExecutionInstanceGUID, PackageName)
      # Removed: unused imports (socket, getpass, uuid, pandas, curses, logging)

      import pyspark.pipelines as dp
      # All table references are inside spark.sql() f-strings — do not use spark.read.table().

      bronze_catalog = spark.conf.get("bronze_catalog")
      bronze_schema = spark.conf.get("bronze_schema")
      silver_catalog = spark.conf.get("silver_catalog")
      silver_schema = spark.conf.get("silver_schema")
      gold_catalog = spark.conf.get("gold_catalog")
      gold_schema = spark.conf.get("gold_schema")


      # Staging: tmpProductCategories
      # Original: TRUNCATE + INSERT INTO dbo.tmpProductCategories
      # Converted to @dp.temporary_view — tmp prefix, staging only used within pipeline
      # Fixed: removed dbo. prefixes, replaced ODS.dbo.X with bronze catalog/schema
      # Fixed: GETDATE() converted to current_timestamp()
      @dp.temporary_view(
          name="tmpProductCategories"
      )
      def tmp_product_categories():
          return spark.sql(f"""
              SELECT C.CategoryId,
                  C.CategoryName,
                  C.ParentCategoryId,
                  CASE
                      WHEN PC.CategoryName IS NULL THEN 'ROOT'
                      WHEN PC.ParentCategoryId IS NULL THEN 'L1'
                      ELSE 'L2'
                  END AS CategoryLevel,
                  CASE WHEN C.EndDate IS NULL OR C.EndDate > current_timestamp()
                      THEN 1 ELSE 0
                  END AS IsActive
              FROM {bronze_catalog}.{bronze_schema}.ProductCategory AS C
              LEFT JOIN {bronze_catalog}.{bronze_schema}.ProductCategory AS PC
                  ON PC.CategoryId = C.ParentCategoryId
              WHERE C.CreatedDate >= '2015-01-01'
              GROUP BY C.CategoryId, C.CategoryName, C.ParentCategoryId,
                  CASE
                      WHEN PC.CategoryName IS NULL THEN 'ROOT'
                      WHEN PC.ParentCategoryId IS NULL THEN 'L1'
                      ELSE 'L2'
                  END,
                  CASE WHEN C.EndDate IS NULL OR C.EndDate > current_timestamp()
                      THEN 1 ELSE 0
                  END
          """)


      # Silver staging: tmpDimProduct
      # Original: TRUNCATE + INSERT INTO StagingDB.dbo.tmpDimProduct
      # Converted to @dp.temporary_view — tmp prefix, staging only used within pipeline
      # Fixed: replaced ODS.dbo.X with bronze, StagingDB.dbo.X with silver references
      # Fixed: CONVERT(VARCHAR(8), date, 112) to date_format(date, 'yyyyMMdd')
      # Fixed: ISNULL() to COALESCE()
      @dp.temporary_view(
          name="tmpDimProduct"
      )
      def tmp_dim_product():
          return spark.sql(f"""
              SELECT P.ProductId AS ProductBK,
                  P.ProductName,
                  COALESCE(CAST(date_format(MAX(P.CreatedDate), 'yyyyMMdd') AS INT),
                      CAT.SkDateCreated) AS SkDateCreated,
                  CAT.SkDateCreated AS SkDateModified,
                  CAST(date_format(MAX(P.StartDate), 'yyyyMMdd') AS INT) AS SkDateStartValidity,
                  CAST(date_format(MAX(P.EndDate), 'yyyyMMdd') AS INT) AS SkDateEndValidity,
                  CASE WHEN COALESCE(Disc.DiscontinuedDate,
                          CAST(date_format(MAX(P.EndDate), 'yyyyMMdd') AS INT))
                      <= CAST(date_format(MAX(P.EndDate), 'yyyyMMdd') AS INT)
                      THEN COALESCE(Disc.DiscontinuedDate,
                          CAST(date_format(MAX(P.EndDate), 'yyyyMMdd') AS INT))
                      ELSE CAST(date_format(MAX(P.EndDate), 'yyyyMMdd') AS INT)
                  END AS SkDateEndValidity_Original,
                  COALESCE(CAT.CategoryLevel, 'ROOT') AS CategoryLevel,
                  CAT.VersionId,
                  CASE WHEN CAT.IsActive = 1 THEN 1 ELSE 0 END AS IsActive
              FROM {bronze_catalog}.{bronze_schema}.Product P
              LEFT JOIN (
                  SELECT C.CategoryId, C.CategoryName, C.CategoryLevel, C.IsActive, 1 AS VersionId,
                      CAST(date_format(C.CreatedDate, 'yyyyMMdd') AS INT) AS SkDateCreated
                  FROM tmpProductCategories C
                  GROUP BY C.CategoryId, C.CategoryName, C.CategoryLevel, C.IsActive,
                      CAST(date_format(C.CreatedDate, 'yyyyMMdd') AS INT)
              ) AS CAT
                  ON CAT.CategoryId = P.CategoryId
              LEFT JOIN (
                  SELECT DISTINCT ProductId, DiscontinuedDate
                  FROM tmpDiscontinuedProducts
              ) AS Disc
                  ON Disc.ProductId = P.ProductId
              GROUP BY P.ProductId, P.ProductName, Disc.DiscontinuedDate, CAT.SkDateCreated,
                  COALESCE(CAT.CategoryLevel, 'ROOT'), CAT.VersionId,
                  CASE WHEN CAT.IsActive = 1 THEN 1 ELSE 0 END
          """)


      # Gold dimension: DimProduct
      # Original: IF seed IS NULL INSERT seed; INSERT staging; MERGE update; MERGE delete; INSERT new rows
      # Converted to @dp.materialized_view — full refresh with seed row + staging UNION ALL
      @dp.materialized_view(
          name=f"{gold_catalog}.{gold_schema}.DimProduct",
          comment="Product dimension table with seed row and surrogate keys"
      )
      def dim_product():
          return spark.sql(f"""
              -- Seed row: provides the "Unknown" dimension member for fact table FKs
              SELECT
                  1 AS ProductSK, 'N/A' AS ProductBK, 'Unknown' AS ProductName,
                  19000101 AS SkDateCreated, 19000101 AS SkDateModified,
                  19000101 AS SkDateStartValidity, 99991231 AS SkDateEndValidity,
                  99991231 AS SkDateEndValidity_Original, 'N/A' AS CategoryLevel,
                  -1 AS VersionId, 0 AS IsActive
              UNION ALL
              -- TODO: Original SSIS used MERGE to update existing rows and INSERT only new ones.
              -- This version does full refresh from staging. If incremental merge is needed,
              -- implement outside the declarative pipeline.
              SELECT
                  ROW_NUMBER() OVER (ORDER BY ProductBK) + 1 AS ProductSK,
                  ProductBK, ProductName,
                  COALESCE(SkDateCreated, 19000101) AS SkDateCreated,
                  COALESCE(SkDateModified, 19000101) AS SkDateModified,
                  COALESCE(SkDateStartValidity, 19000101) AS SkDateStartValidity,
                  COALESCE(SkDateEndValidity, 99991231) AS SkDateEndValidity,
                  COALESCE(SkDateEndValidity_Original, 99991231) AS SkDateEndValidity_Original,
                  CategoryLevel, VersionId, IsActive
              FROM tmpDimProduct
          """)
