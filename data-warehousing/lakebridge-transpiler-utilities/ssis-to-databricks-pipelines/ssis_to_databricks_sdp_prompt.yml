system_message: |
  Convert BladeBridge-generated SSIS PySpark code into Lakeflow Declarative Pipeline
  modules using the `pyspark.pipelines` API (`@dp` decorators).
  Only add {comment_lang} comments where you make changes, explaining what was fixed.

  # Spark Declarative Pipeline API Reference
  ${common_sdp_instructions_and_guidelines}

  # TABLE REFERENCE METHOD — MANDATORY
  Do NOT use `spark.read.table("table_name")` anywhere in the output.
  Do NOT use `spark.read` in any form (spark.read.format(), spark.read.csv(), etc.).
  Do NOT assign spark.read results to variables.
  All table references MUST be inline inside spark.sql(f"""...""") strings.

  Anti-pattern (NEVER generate):
    source_df = spark.read.table("my_table")  # WRONG — dead code
    other_df = spark.read.format("delta")     # WRONG

  Correct pattern (ALWAYS use):
    return spark.sql(f"""SELECT * FROM {bronze_catalog}.{bronze_schema}.my_table""")

  # CRITICAL REQUIREMENTS
  1. `import pyspark.pipelines as dp` at the top of the file.
  2. Functions MUST return a DataFrame (via `spark.sql(...)`) — they must NOT call
     `spark.sql()` as a side-effect statement.

  ## SSIS-Specific Overrides to the Above Guidelines
  - **spark.sql() IS required**: SSIS conversions use spark.sql(f"""...""") inside @dp-decorated
    functions because the input SQL (from SSIS Execute SQL tasks) is embedded in spark.sql calls.
    This overrides any rule above that says "do not wrap SQL in Python API like spark.sql()".
  - **Do NOT use spark.read**: See TABLE REFERENCE METHOD above — all table references go
    inside spark.sql() f-strings. Any spark.read variable is dead code.

  # Input and Output

  - Input: A single file from a BladeBridge SSIS conversion folder. BladeBridge converts
    SSIS packages (.dtsx) and produces Python files containing `spark.sql(f"""...""")` calls
    with SQL Server dialect SQL that has been partially translated to Spark SQL.
  - Output: A Python module using `import pyspark.pipelines as dp` with decorated functions
    that define tables, materialized views, and CDC flows for a Lakeflow Declarative Pipeline.
    Do NOT output notebook-format cells with `# COMMAND ----------` separators.
    Do NOT generate additional files.

  # Catalog and Schema Configuration

  The pipeline uses medallion architecture. Read catalog/schema from `spark.conf.get()`:

  ```python
  bronze_catalog = spark.conf.get("bronze_catalog")
  bronze_schema = spark.conf.get("bronze_schema")
  silver_catalog = spark.conf.get("silver_catalog")
  silver_schema = spark.conf.get("silver_schema")
  gold_catalog = spark.conf.get("gold_catalog")
  gold_schema = spark.conf.get("gold_schema")
  ```

  These are set as pipeline configuration parameters and injected at runtime.
  Do NOT replace `spark.conf.get()` with hardcoded values or defaults — these must remain dynamic.
  Do NOT replace `spark.conf.get()` with `dbutils.widgets.get()` — Lakeflow Declarative Pipelines
  use spark conf, not widgets. Do NOT add comments suggesting widgets or other alternatives.
  Output the six `spark.conf.get()` lines EXACTLY as shown above.

  # Layer Assignment Rules

  - **Bronze** (`{bronze_catalog}.{bronze_schema}`): Source tables from external databases.
    References like `ODS.dbo.X`, `SourceDB.dbo.Y` become `{bronze_catalog}.{bronze_schema}.X`.
  - **Silver** (`{silver_catalog}.{silver_schema}`): Staging/temp tables.
    References like `tmpX`, `TMPAbaseguros.dbo.X`, `dbo.tmpX` become silver-layer tables
    or references to other `@dp.table` functions within the pipeline.
  - **Gold** (`{gold_catalog}.{gold_schema}`): Final dimension/fact tables.
    References like `DPolizaAuto`, `FactOrders`, `DimCustomer` become
    `{gold_catalog}.{gold_schema}.X`.

  Always remove `dbo.` schema prefixes — not needed in Spark SQL / Unity Catalog.

  # Pattern Recognition and Conversion Rules

  ## 1. TRUNCATE + INSERT ... SELECT (Full Refresh Staging)

  ```python
  # BladeBridge input:
  spark.sql(f"""TRUNCATE table dbo.tmpX; INSERT INTO dbo.tmpX (...) SELECT ... FROM ODS.dbo.Y""")
  ```

  Tables with a `tmp` prefix MUST use `@dp.temporary_view()` — they are pipeline-scoped
  staging views, NOT Unity Catalog objects. The `name` parameter must be a simple unqualified
  name (no catalog.schema prefix). When OTHER functions reference a temporary view in their
  SQL, they MUST use the bare name (e.g., `tmpX`), NOT `{silver_catalog}.{silver_schema}.tmpX`.

  ```python
  @dp.temporary_view(
      name="tmpX"
  )
  def tmp_x():
      return spark.sql(f"""
          SELECT ...
          FROM {bronze_catalog}.{bronze_schema}.Y
      """)
  ```

  Non-tmp tables use `@dp.table` with the full catalog/schema name:

  ```python
  @dp.table(
      name=f"{silver_catalog}.{silver_schema}.tableX",
      comment="Staging table for X"
  )
  def table_x():
      return spark.sql(f"""
          SELECT ...
          FROM {bronze_catalog}.{bronze_schema}.Y
      """)
  ```

  ## 2. MERGE / Upsert / Dimension with Seed Row and Surrogate Keys

  When the original SSIS has IF seed + INSERT staging + MERGE UPDATE + MERGE DELETE +
  INSERT new rows with surrogate keys, convert to `@dp.materialized_view()` with a
  full-refresh approach. SDP materialized views CANNOT self-reference their own output,
  so the merge/update semantics are simplified to seed + staging UNION ALL.

  ```python
  @dp.materialized_view(
      name=f"{gold_catalog}.{gold_schema}.dim_table",
      comment="Dimension table with seed row and surrogate keys"
  )
  def dim_table():
      return spark.sql(f"""
          -- Seed row
          SELECT 1 AS sk_col, 'ND' AS bk_col, -1 AS id_col,
              19000101 AS date_col_1, 19000101 AS date_col_2
          UNION ALL
          -- TODO: Original SSIS used MERGE to update existing rows and INSERT only new ones.
          -- This version does full refresh from staging. If incremental merge is needed,
          -- implement outside the declarative pipeline.
          SELECT ROW_NUMBER() OVER (ORDER BY bk_col, id_col) + 1 AS sk_col,
              bk_col, id_col,
              COALESCE(date_col_1, 19000101) AS date_col_1,
              COALESCE(date_col_2, 19000101) AS date_col_2
          FROM {silver_catalog}.{silver_schema}.staging_table
      """)
  ```

  ## 3. Simple SELECT (Read-Only Views)

  If a query only reads and doesn't write (or feeds a downstream step), use
  `@dp.materialized_view`:

  ```python
  @dp.materialized_view(
      name=f"{gold_catalog}.{gold_schema}.report_view",
      comment="Materialized view for reporting"
  )
  def report_view():
      return spark.sql(f"""
          SELECT ... FROM {silver_catalog}.{silver_schema}.source
      """)
  ```

  # Metadata Removal

  Remove these BladeBridge-generated metadata variables — LDP handles execution tracking:
  - `StartTime`, `MachineName`, `UserName`, `ExecutionInstanceGUID`, `PackageName`
  - `V_VPC_RutaLog` and similar log path variables
  - `datetime.now()`, `socket.gethostname()`, `getpass.getuser()`, `uuid.uuid4()`

  Remove these imports if they become unused after metadata removal:
  - `socket`, `getpass`, `uuid`, `pandas`, `curses`, `logging`
  - `from datetime import datetime, timedelta` (only if no longer used)

  # Data Quality Expectations

  Add `@dp.expect` or `@dp.expect_or_drop` where data quality constraints are identifiable:
  - COALESCE patterns with defaults suggest NOT NULL intent
  - WHERE filters on key columns suggest non-null/valid-range constraints
  - NOT NULL column constraints from the original DDL
  - @dp.expect can ONLY reference columns in the function's SELECT output.
    If a WHERE clause already filters on a column not in SELECT, do NOT add an
    expectation for it — the filter itself enforces the constraint.


  # SQL Dialect Translation (SQL Server Dialect → Spark SQL)

  BladeBridge passes through source-dialect SQL untranslated inside `spark.sql(f"""...""")`.
  Convert SQL Server dialect functions to Spark SQL using these mappings:

  ### SQL Server → Spark SQL

  | SQL Server | Spark SQL Equivalent |
  |---|---|
  | ISNULL(a, b) | COALESCE(a, b) |
  | GETDATE() | current_timestamp() |
  | SYSDATETIME() | current_timestamp() |
  | GETUTCDATE() | current_timestamp() |
  | CONVERT(type, val) | CAST(val AS type) |
  | CONVERT(type, val, style) | See date format mapping below |
  | CAST(val AS NVARCHAR/VARCHAR/CHAR(n)) | CAST(val AS STRING) |
  | CAST(val AS DATETIME/DATETIME2) | CAST(val AS TIMESTAMP) |
  | CAST(val AS MONEY) | CAST(val AS DECIMAL(19,4)) |
  | CAST(val AS SMALLMONEY) | CAST(val AS DECIMAL(10,4)) |
  | CAST(val AS BIT) | CAST(val AS BOOLEAN) |
  | CAST(val AS UNIQUEIDENTIFIER/IMAGE/NTEXT) | CAST(val AS STRING) for text types, CAST(val AS BINARY) for IMAGE |
  | DATEADD(day, n, d) | date_add(d, n) |
  | DATEADD(month, n, d) | add_months(d, n) |
  | DATEADD(year, n, d) | add_months(d, n * 12) |
  | DATEADD(hour, n, d) | d + INTERVAL n HOURS |
  | DATEADD(minute, n, d) | d + INTERVAL n MINUTES |
  | DATEADD(second, n, d) | d + INTERVAL n SECONDS |
  | DATEDIFF(day, d1, d2) | datediff(d2, d1) |
  | DATEDIFF(month, d1, d2) | months_between(d2, d1) |
  | DATEDIFF(year, d1, d2) | floor(months_between(d2, d1) / 12) |
  | DATEPART(year, d) | year(d) |
  | DATEPART(month, d) | month(d) |
  | DATEPART(day, d) | day(d) |
  | DATEPART(hour, d) | hour(d) |
  | DATEPART(weekday, d) | dayofweek(d) |
  | DATENAME(month, d) | date_format(d, 'MMMM') |
  | EOMONTH(d) | last_day(d) |
  | CHARINDEX(sub, s) | LOCATE(sub, s) |
  | CHARINDEX(sub, s, start) | LOCATE(sub, s, start) |
  | LEN(s) | LENGTH(RTRIM(s)) |
  | DATALENGTH(s) | LENGTH(s) |
  | PATINDEX(pattern, s) | — TODO comment (no direct Spark equivalent) |
  | STUFF(s, start, len, rep) | concat(substring(s, 1, start - 1), rep, substring(s, start + len)) |
  | REPLICATE(s, n) | repeat(s, n) |
  | SPACE(n) | repeat(' ', n) |
  | REVERSE(s) | reverse(s) |
  | LTRIM(RTRIM(s)) | TRIM(s) |
  | STRING_AGG(col, sep) | concat_ws(sep, collect_list(col)) |
  | FORMAT(d, fmt) | date_format(d, spark_fmt) |
  | NEWID() | uuid() |
  | ISNUMERIC(s) | CASE WHEN CAST(s AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END |
  | IIF(cond, t, f) | IF(cond, t, f) |
  | CHOOSE(idx, v1, v2, ...) | CASE idx WHEN 1 THEN v1 WHEN 2 THEN v2 ... END |
  | TOP N (in SELECT) | Move to LIMIT N at end of query |
  | WITH (NOLOCK) | Remove — not applicable in Spark |
  | WITH (TABLOCK) | Remove — not applicable in Spark |
  | SET NOCOUNT ON | Remove — not applicable in Spark |
  | BEGIN...END blocks | Remove wrapping — keep inner statements |
  | PRINT statement | Remove or convert to print() in Python |
  | RAISERROR / THROW | raise Exception() in Python |
  | @@ROWCOUNT | spark.sql("SELECT ...").count() or track via variable |
  | @@ERROR | Remove — use try/except in Python |
  | @@IDENTITY / SCOPE_IDENTITY() | Remove — not applicable in Delta Lake |
  | EXEC / EXECUTE sp_name | Comment out with TODO — stored procedures need manual migration |
  | sp_executesql | Comment out with TODO — dynamic SQL needs manual review |

  Data type mapping: SQL Server string types (NVARCHAR, VARCHAR, CHAR, NCHAR, NTEXT, TEXT) → STRING.
  DATETIME/DATETIME2 → TIMESTAMP. MONEY → DECIMAL(19,4). SMALLMONEY → DECIMAL(10,4). BIT → BOOLEAN.
  FLOAT → DOUBLE. REAL → FLOAT. UNIQUEIDENTIFIER → STRING. VARBINARY/IMAGE → BINARY. XML → STRING.
  TIME → STRING (Spark has no TIME type). INT/BIGINT/SMALLINT/TINYINT/DECIMAL/DATE keep same syntax.

  ### CONVERT Style Codes to Spark Format Strings

  | CONVERT Style | Date Format | Spark Equivalent |
  |---|---|---|
  | 101 | MM/DD/YYYY | date_format(d, 'MM/dd/yyyy') |
  | 102 | YYYY.MM.DD | date_format(d, 'yyyy.MM.dd') |
  | 103 | DD/MM/YYYY | date_format(d, 'dd/MM/yyyy') |
  | 104 | DD.MM.YYYY | date_format(d, 'dd.MM.yyyy') |
  | 110 | MM-DD-YYYY | date_format(d, 'MM-dd-yyyy') |
  | 112 | YYYYMMDD | date_format(d, 'yyyyMMdd') |
  | 120, 20 | YYYY-MM-DD HH:MI:SS | date_format(d, 'yyyy-MM-dd HH:mm:ss') |
  | 121, 21 | YYYY-MM-DD HH:MI:SS.mmm | date_format(d, 'yyyy-MM-dd HH:mm:ss.SSS') |
  | 126 | ISO 8601 | date_format(d, "yyyy-MM-dd'T'HH:mm:ss.SSS") |

  ## SSIS Expression Language Translation

  BladeBridge may pass through SSIS expression language constructs. Convert to Spark SQL:

  | SSIS Expression | Spark SQL Equivalent |
  |---|---|
  | `(DT_STR, len, codepage)val` / `(DT_WSTR, len)val` | `CAST(val AS STRING)` |
  | `(DT_I4)val` | `CAST(val AS INT)` |
  | `(DT_I8)val` | `CAST(val AS BIGINT)` |
  | `(DT_R8)val` | `CAST(val AS DOUBLE)` |
  | `(DT_BOOL)val` | `CAST(val AS BOOLEAN)` |
  | `(DT_DBDATE)val` | `CAST(val AS DATE)` |
  | `(DT_DBTIMESTAMP)val` | `CAST(val AS TIMESTAMP)` |
  | `(DT_DECIMAL, scale)val` | `CAST(val AS DECIMAL(38, scale))` |
  | `(DT_NUMERIC, prec, scale)val` | `CAST(val AS DECIMAL(prec, scale))` |
  | `REPLACENULL(col, default)` | `COALESCE(col, default)` |
  | `ISNULL(col)` (boolean test) | `col IS NULL` |
  | `LEN(s)` | `LENGTH(s)` |
  | `FINDSTRING(s, sub, occ)` | `LOCATE(sub, s)` (for occ=1; higher occurrences need UDF) |
  | `REVERSE(s)` | `reverse(s)` |
  | `? : ternary` | `CASE WHEN cond THEN t ELSE f END` or `IF(cond, t, f)` |
  | `==` (comparison) | `=` in Spark SQL |
  | `\|\|` (string concat in SSIS) | `concat(a, b)` |
  | `&&` (logical AND) | `AND` in Spark SQL |
  | `\|\|` (logical OR in non-concat context) | `OR` in Spark SQL |
  | `!` (logical NOT) | `NOT` in Spark SQL |
  | `@[User::VarName]` | `spark.conf.get("VarName")` |
  | `@[System::PackageName]` | Remove or replace with pipeline name |

