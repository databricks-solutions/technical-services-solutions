  - role: user
    content: |
      # Databricks notebook source
      # Code converted on 2026-03-03 16:37:55
      import os
      from pyspark.sql import *
      from pyspark.sql.functions import *
      from pyspark.sql.window import Window
      from pyspark.sql.types import *
      from datetime import datetime
      from pyspark.dbutils import DBUtils
      from delta.tables import DeltaTable
      from databricks_conversion_supplements import DatabricksConversionSupplements



      # COMMAND ----------

      # Set global variables
      starttime = datetime.now() #start timestamp of the script
      # COMMAND ----------
      # Variable_declaration_commentdbutils.widgets.text(name = "VAR100", defaultValue = 'ABCDE')
      VAR100 = dbutils.widgets.get("VAR100")

      dbutils.widgets.text(name = "VAR200", defaultValue = 200)
      VAR200 = dbutils.widgets.get("VAR200")

      # COMMAND ----------
      # Processing node SQ_Employees, type Standard_D4ds_v5
      # COLUMN COUNT: 4
      SQ_Employees = spark.sql(f"""SELECT
      Employees.Emp_id,
      Employees.first_name,
      Employees.last_name,
      Employees.hired_date
      FROM Employees
      WHERE Employees.hired_date > '2020-01-01'""").withColumn('sys_row_id',xxhash64(concat_ws('||', 'Emp_id','first_name','last_name','hired_date')))
      # Conforming fields names to the component layout
      SQ_Employees_conformed_cols = ["Emp_id", "first_name", "last_name", "hired_date"]
      SQ_Employees = DatabricksConversionSupplements.conform_df_columns(SQ_Employees,SQ_Employees_conformed_cols)


      # COMMAND ----------
      # Processing node EXP_Transform, type Standard_D4ds_v5 . Note: using additional SELECT to rename incoming columns
      # COLUMN COUNT: 5
      SQ_Employees = SQ_Employees.withColumn("v_full_name", concat(col('first_name') , lit(" ") , col('last_name2')))

      EXP_Transform = SQ_Employees.select( \
      	SQ_Employees.sys_row_id.alias('sys_row_id'), \
      	SQ_Employees.first_name.alias('first_name'), \
      	SQ_Employees.last_name.alias('last_name2'), \
      	SQ_Employees.hired_date.alias('hired_date')).select( \
      	(col('sys_row_id')).alias('sys_row_id'), \
      	col('first_name'), \
      	col('last_name2'), \
      	(col('v_full_name')).alias('out_full_name'), \
      	col('hired_date'), \
      	(datediff(current_date() , col('hired_date'))).alias('out_days_worked') \
      )


      # COMMAND ----------
      # Processing node FIL_Active, type Standard_D4ds_v5
      FIL_Active = SQ_Employees.select(
          col('Emp_id'), col('first_name'), col('last_name'), col('dept_name')
      ).filter(expr(f"""SUBSTR ( dept_name , 1 , 3 ) != \"000\" and first_name != '{'{VAR100}'}'"""))


      # COMMAND ----------
      # Processing node dim_employees, type Standard_D4ds_v5
      # COLUMN COUNT: 5
      # Joining dataframes SQ_Employees, EXP_Transform to form dim_employees
      dim_employees_joined = SQ_Employees.join(EXP_Transform, SQ_Employees.sys_row_id == EXP_Transform.sys_row_id, 'inner')

      dim_employees = dim_employees_joined.select( \
      	lit(None).cast(LongType()).alias('EMP_KEY'), \
      	EXP_Transform.out_full_name.cast(StringType()).alias('FULL_NAME'), \
      	SQ_Employees.hired_date.cast(TimestampType()).alias('HIRE_DATE'), \
      	EXP_Transform.out_days_worked.cast(LongType()).alias('DAYS_EMPLOYED'), \
      	lit(None).cast(TimestampType()).alias('LOAD_TS') \
      )
      dim_employees.write.saveAsTable('dim_employees', mode = 'append')

      dim_employees = dim_employees_joined.select( \
      	lit(None).cast(LongType()).alias('EMP_KEY'), \
      	EXP_Transform.out_full_name.cast(StringType()).alias('FULL_NAME'), \
      	SQ_Employees.hired_date.cast(TimestampType()).alias('HIRE_DATE'), \
      	EXP_Transform.out_days_worked.cast(LongType()).alias('DAYS_EMPLOYED'), \
      	lit(None).cast(TimestampType()).alias('LOAD_TS') \
      )
      dim_employees.write.saveAsTable('dim_employees', mode = 'append')

      quit()
