    content: |
      # Databricks notebook source
      from curses import meta
      from logging import exception
      import sys
      import re
      import socket
      import getpass
      import uuid
      import pandas as pd
      from datetime import datetime, timedelta
      from pyspark.context import SparkContext
      from pyspark.sql.functions import *

      StartTime = datetime.now().strftime("%Y%m%d %H:%M:%S")
      MachineName = socket.gethostname()
      UserName = getpass.getuser()
      ExecutionInstanceGUID = str(uuid.uuid4())
      PackageName = 'SSIS_DWH_DimProduct'

      V_VPC_LogPath = f'\\server01\Logs'




      # COMMAND ----------

      # Processing node Package\Load tmpProductCategories, type i3.xlarge
      # component nameLoad tmpProductCategories
      # input parameters :
      # output parameters :
      Package_Load_tmpProductCategories = f"""--Clear staging table

      TRUNCATE table dbo.tmpProductCategories

      -- Load product categories from source
      ;
      INSERT INTO dbo.tmpProductCategories
      	(CategoryId,CategoryName,ParentCategoryId,CategoryLevel,IsActive)

      Select C.CategoryId,
      		C.CategoryName,
      		C.ParentCategoryId,
      		CASE
      		WHEN PC.CategoryName IS NULL THEN 'ROOT'
      		WHEN PC.ParentCategoryId IS NULL THEN 'L1'
      		ELSE 'L2'
      		END AS CategoryLevel,
      		CASE WHEN C.EndDate IS NULL OR C.EndDate > GETDATE() THEN 1 ELSE 0 END As IsActive
      FROM  ODS.dbo.ProductCategory AS C
            LEFT JOIN ODS.dbo.ProductCategory AS PC ON PC.CategoryId = C.ParentCategoryId
       Where C.CreatedDate >= '2015-01-01'
       Group by C.CategoryId,
      		C.CategoryName,
      		C.ParentCategoryId,
      		CASE
      		WHEN PC.CategoryName IS NULL THEN 'ROOT'
      		WHEN PC.ParentCategoryId IS NULL THEN 'L1'
      		ELSE 'L2'
      		END,
      		CASE WHEN C.EndDate IS NULL OR C.EndDate > GETDATE() THEN 1 ELSE 0 END
      ;"""
      spark.sql(Package_Load_tmpProductCategories)

      # COMMAND ----------

      # Processing node Package\Load DimProduct, type i3.xlarge
      # component nameLoad DimProduct
      # input parameters :
      # output parameters :
      Package_Load_DimProduct = f"""--Clear staging table

      TRUNCATE table StagingDB.dbo.tmpDimProduct

      -- Load DimProduct dimension
      ;
      IF (SELECT DISTINCT ProductSK FROM dbo.DimProduct Where ProductSK = 1) IS NULL
      THEN

      		INSERT INTO dbo.DimProduct
      (
      		ProductSK,ProductBK,ProductName,SkDateCreated,SkDateModified,
      		SkDateStartValidity,SkDateEndValidity,SkDateEndValidity_Original,
      		CategoryLevel,VersionId,IsActive)
      		SELECT
      		ProductSK = 1, ProductBK = 'N/A', ProductName = 'Unknown',
      		SkDateCreated = 19000101, SkDateModified = 19000101,
      		SkDateStartValidity = 19000101, SkDateEndValidity = 99991231,
      		SkDateEndValidity_Original = 99991231, CategoryLevel = 'N/A',
      		VersionId = -1, IsActive = 0
      ;

      END IF

      ;
      INSERT INTO StagingDB.dbo.tmpDimProduct
      (ProductBK,ProductName,SkDateCreated,SkDateModified,SkDateStartValidity,
      SkDateEndValidity,SkDateEndValidity_Original,CategoryLevel,VersionId,IsActive)

      	Select	P.ProductId,
      			P.ProductName,
      			COALESCE(CAST(CONVERT(VARCHAR(8), MAX(P.CreatedDate), 112) AS INT), CAT.SkDateCreated) As SkDateCreated,
      			CAT.SkDateCreated As SkDateModified,
      			CAST(CONVERT(VARCHAR(8), MAX(P.StartDate), 112) AS INT) As SkDateStartValidity,
      			CAST(CONVERT(VARCHAR(8), MAX(P.EndDate), 112) AS INT) As SkDateEndValidity,
      			CASE WHEN COALESCE(Disc.DiscontinuedDate, CAST(CONVERT(VARCHAR(8), MAX(P.EndDate), 112) AS INT))
      				<= CAST(CONVERT(VARCHAR(8), MAX(P.EndDate), 112) AS INT)
      			THEN COALESCE(Disc.DiscontinuedDate, CAST(CONVERT(VARCHAR(8), MAX(P.EndDate), 112) AS INT))
      			ELSE CAST(CONVERT(VARCHAR(8), MAX(P.EndDate), 112) AS INT)
      			END As SkDateEndValidity_Original,
      			ISNULL(CAT.CategoryLevel, 'ROOT') As CategoryLevel,
      			CAT.VersionId,
      			CASE WHEN CAT.IsActive = 1 THEN 1 ELSE 0 END As IsActive
      From `ODS`.`dbo`.`Product` P
      Left Join (		Select C.CategoryId, C.CategoryName, C.CategoryLevel, C.IsActive, 1 as VersionId,
      					CAST(CONVERT(VARCHAR(8), C.CreatedDate, 112) AS INT) As SkDateCreated
      				From `StagingDB`.`dbo`.`tmpProductCategories` C
      				Group by C.CategoryId, C.CategoryName, C.CategoryLevel, C.IsActive,
      					CAST(CONVERT(VARCHAR(8), C.CreatedDate, 112) AS INT)
      		  ) AS CAT
      		  ON(CAT.CategoryId = P.CategoryId)
      Left Join (	Select DISTINCT ProductId, DiscontinuedDate
      			From `StagingDB`.`dbo`.`tmpDiscontinuedProducts`
      			) As Disc ON(Disc.ProductId = P.ProductId)
      Group by P.ProductId, P.ProductName, Disc.DiscontinuedDate, CAT.SkDateCreated,
      		ISNULL(CAT.CategoryLevel, 'ROOT'), CAT.VersionId,
      		CASE WHEN CAT.IsActive = 1 THEN 1 ELSE 0 END

      ;
      MERGE INTO b
      USING (
      SELECT *
      FROM `StagingDB`.`dbo`.`tmpDimProduct` a
      INNER JOIN dbo.DimProduct b ON ( a.ProductBK = b.ProductBK )
      )
      ON 1 = 1
      WHEN MATCHED THEN UPDATE SET
      SkDateCreated = COALESCE ( a.SkDateCreated , 19000101 ) ,
      SkDateModified = COALESCE ( a.SkDateModified , 19000101 ) ,
      SkDateStartValidity = COALESCE ( a.SkDateStartValidity , 19000101 ) ,
      SkDateEndValidity = COALESCE ( a.SkDateEndValidity , 99991231 ) ,
      SkDateEndValidity_Original = COALESCE ( a.SkDateEndValidity_Original , 99991231 ) ,
      CategoryLevel = a.CategoryLevel ,
      VersionId = a.VersionId ,
      IsActive = a.IsActive
      ;

      MERGE INTO `StagingDB`.`dbo`.`tmpDimProduct` a_tgt
      USING (
      select *
      FROM `StagingDB`.`dbo`.`tmpDimProduct` a
      INNER JOIN dbo.DimProduct b ON (a.ProductBK = b.ProductBK)
      )   ON  COALESCE(a.ProductBK,'_NULL_') = COALESCE(a_tgt.ProductBK,'_NULL_')
      WHEN MATCHED THEN DELETE ;
      INSERT INTO dbo.DimProduct
      (
      		ProductSK,ProductBK,ProductName,SkDateCreated,SkDateModified,
      		SkDateStartValidity,SkDateEndValidity,SkDateEndValidity_Original,
      		CategoryLevel,VersionId,IsActive)

      SELECT (SELECT COALESCE(MAX(ProductSK), 999) FROM dbo.DimProduct) + ROW_NUMBER() OVER ( ORDER BY ProductBK),
      		ProductBK,ProductName,
      		COALESCE(SkDateCreated,19000101) As SkDateCreated,
      		COALESCE(SkDateModified,19000101) As SkDateModified,
      		COALESCE(SkDateStartValidity,19000101) As SkDateStartValidity,
      		COALESCE(SkDateEndValidity,99991231) As SkDateEndValidity,
      		COALESCE(SkDateEndValidity_Original,99991231) As SkDateEndValidity_Original,
      		CategoryLevel,VersionId,IsActive
      FROM `StagingDB`.`dbo`.`tmpDimProduct`
      ;"""
      spark.sql(Package_Load_DimProduct)
  - role: assistant
    content: |
      -- Lakeflow Declarative Pipeline for SSIS_DWH_DimProduct
      -- Converted from BladeBridge SSIS output
      -- Removed: metadata variables (StartTime, MachineName, UserName, ExecutionInstanceGUID, PackageName, V_VPC_LogPath)

      -- Staging: tmpProductCategories
      -- Original: TRUNCATE + INSERT INTO dbo.tmpProductCategories
      -- Converted to TEMPORARY VIEW — tmp prefix, pipeline-scoped only
      -- Fixed: GETDATE() → current_timestamp(); dbo. removed; ODS.dbo.X → ${bronze_catalog}.${bronze_schema}.X
      CREATE TEMPORARY VIEW tmpProductCategories AS
      SELECT C.CategoryId,
          C.CategoryName,
          C.ParentCategoryId,
          CASE
              WHEN PC.CategoryName IS NULL THEN 'ROOT'
              WHEN PC.ParentCategoryId IS NULL THEN 'L1'
              ELSE 'L2'
          END AS CategoryLevel,
          CASE WHEN C.EndDate IS NULL OR C.EndDate > current_timestamp()
              THEN 1 ELSE 0
          END AS IsActive
      FROM ${bronze_catalog}.${bronze_schema}.ProductCategory AS C
      LEFT JOIN ${bronze_catalog}.${bronze_schema}.ProductCategory AS PC
          ON PC.CategoryId = C.ParentCategoryId
      WHERE C.CreatedDate >= '2015-01-01'
      GROUP BY C.CategoryId, C.CategoryName, C.ParentCategoryId,
          CASE
              WHEN PC.CategoryName IS NULL THEN 'ROOT'
              WHEN PC.ParentCategoryId IS NULL THEN 'L1'
              ELSE 'L2'
          END,
          CASE WHEN C.EndDate IS NULL OR C.EndDate > current_timestamp()
              THEN 1 ELSE 0
          END;


      -- Staging: tmpDimProduct
      -- Original: TRUNCATE + INSERT INTO StagingDB.dbo.tmpDimProduct
      -- Converted to TEMPORARY VIEW — tmp prefix, pipeline-scoped only
      -- Fixed: CONVERT(VARCHAR(8), date, 112) → date_format(date, 'yyyyMMdd'); ISNULL() → COALESCE()
      -- Fixed: ODS.dbo.Product → ${bronze_catalog}.${bronze_schema}.Product; tmpProductCategories referenced by bare name
      CREATE TEMPORARY VIEW tmpDimProduct AS
      SELECT P.ProductId AS ProductBK,
          P.ProductName,
          COALESCE(CAST(date_format(MAX(P.CreatedDate), 'yyyyMMdd') AS INT),
              CAT.SkDateCreated) AS SkDateCreated,
          CAT.SkDateCreated AS SkDateModified,
          CAST(date_format(MAX(P.StartDate), 'yyyyMMdd') AS INT) AS SkDateStartValidity,
          CAST(date_format(MAX(P.EndDate), 'yyyyMMdd') AS INT) AS SkDateEndValidity,
          CASE WHEN COALESCE(Disc.DiscontinuedDate,
                  CAST(date_format(MAX(P.EndDate), 'yyyyMMdd') AS INT))
              <= CAST(date_format(MAX(P.EndDate), 'yyyyMMdd') AS INT)
              THEN COALESCE(Disc.DiscontinuedDate,
                  CAST(date_format(MAX(P.EndDate), 'yyyyMMdd') AS INT))
              ELSE CAST(date_format(MAX(P.EndDate), 'yyyyMMdd') AS INT)
          END AS SkDateEndValidity_Original,
          COALESCE(CAT.CategoryLevel, 'ROOT') AS CategoryLevel,
          CAT.VersionId,
          CASE WHEN CAT.IsActive = 1 THEN 1 ELSE 0 END AS IsActive
      FROM ${bronze_catalog}.${bronze_schema}.Product P
      LEFT JOIN (
          SELECT C.CategoryId, C.CategoryName, C.CategoryLevel, C.IsActive, 1 AS VersionId,
              CAST(date_format(C.CreatedDate, 'yyyyMMdd') AS INT) AS SkDateCreated
          FROM tmpProductCategories C
          GROUP BY C.CategoryId, C.CategoryName, C.CategoryLevel, C.IsActive,
              CAST(date_format(C.CreatedDate, 'yyyyMMdd') AS INT)
      ) AS CAT
          ON CAT.CategoryId = P.CategoryId
      LEFT JOIN (
          SELECT DISTINCT ProductId, DiscontinuedDate
          FROM tmpDiscontinuedProducts
      ) AS Disc
          ON Disc.ProductId = P.ProductId
      GROUP BY P.ProductId, P.ProductName, Disc.DiscontinuedDate, CAT.SkDateCreated,
          COALESCE(CAT.CategoryLevel, 'ROOT'), CAT.VersionId,
          CASE WHEN CAT.IsActive = 1 THEN 1 ELSE 0 END;


      -- Gold dimension: DimProduct
      -- Original: IF seed IS NULL INSERT seed; INSERT staging; MERGE update; MERGE delete; INSERT new rows
      -- Converted to MATERIALIZED VIEW — full refresh with seed row + staging UNION ALL
      -- TODO: Original SSIS used MERGE to update existing rows and INSERT only new ones.
      -- This version does full refresh from staging. If incremental merge is needed,
      -- implement outside the declarative pipeline.
      CREATE OR REFRESH MATERIALIZED VIEW ${gold_catalog}.${gold_schema}.DimProduct
      COMMENT "Product dimension table with seed row and surrogate keys"
      AS
      -- Seed row: provides the "Unknown" dimension member for fact table FKs
      SELECT
          1 AS ProductSK, 'N/A' AS ProductBK, 'Unknown' AS ProductName,
          19000101 AS SkDateCreated, 19000101 AS SkDateModified,
          19000101 AS SkDateStartValidity, 99991231 AS SkDateEndValidity,
          99991231 AS SkDateEndValidity_Original, 'N/A' AS CategoryLevel,
          -1 AS VersionId, 0 AS IsActive
      UNION ALL
      SELECT
          ROW_NUMBER() OVER (ORDER BY ProductBK) + 1 AS ProductSK,
          ProductBK, ProductName,
          COALESCE(SkDateCreated, 19000101) AS SkDateCreated,
          COALESCE(SkDateModified, 19000101) AS SkDateModified,
          COALESCE(SkDateStartValidity, 19000101) AS SkDateStartValidity,
          COALESCE(SkDateEndValidity, 99991231) AS SkDateEndValidity,
          COALESCE(SkDateEndValidity_Original, 99991231) AS SkDateEndValidity_Original,
          CategoryLevel, VersionId, IsActive
      FROM tmpDimProduct;
